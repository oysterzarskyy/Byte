name: Bug report
description: Report a problem with the Byte prototype
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Byte.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the issue clearly.
      placeholder: The prototype crashed when...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: I expected...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, Gradle version, Love2D version, etc.
